apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlineshop
  namespace: onlineshop

spec:
  replicas: 3

  selector:
    matchLabels:
      app: onlineshop

  template:
    metadata:
      labels:
        app: onlineshop

    spec:
      containers:
      - name: onlineshop

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        envFrom:
        - configMapRef:
            name: onlineshop-config

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"
